name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check — api-core
        run: npx tsc --noEmit --project services/api-core/tsconfig.json

      - name: Type check — backoffice
        run: npx tsc --noEmit --project apps/backoffice/tsconfig.json

  build-api:
    name: Build api-core Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-core image (no push)
        uses: docker/build-push-action@v5
        with:
          context: services/api-core
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backoffice:
    name: Build backoffice (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=apps/backoffice
        env:
          VITE_API_URL: ''
