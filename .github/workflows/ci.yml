name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Test — api-core
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       erp_lite
          POSTGRES_USER:     erp_lite
          POSTGRES_PASSWORD: erp_lite
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_lite -d erp_lite"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://erp_lite:erp_lite@localhost:5432/erp_lite
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate:dev --workspace=services/api-core

      - name: Run tests
        run: npm test --workspace=services/api-core

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check — api-core
        run: npx tsc --noEmit --project services/api-core/tsconfig.json

      - name: Type check — backoffice
        run: npx tsc --noEmit --project apps/backoffice/tsconfig.json

  build-api:
    name: Build api-core Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-core image (no push)
        uses: docker/build-push-action@v5
        with:
          context: services/api-core
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backoffice:
    name: Build backoffice (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=apps/backoffice
        env:
          VITE_API_URL: ''

  api-docs:
    name: Validate API docs (OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI spec
        run: npm run docs:api:lint

      - name: Build API docs (proves it renders, doesn't publish)
        run: npm run docs:api:build
