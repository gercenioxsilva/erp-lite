name: Deploy to AWS — prod

on:
  push:
    branches: [main]

# AWS_REGION matches terraform/variables.tf default (us-east-1).
# All other runtime values come from Terraform outputs — no extra secrets needed.
env:
  AWS_REGION:                   us-east-1
  API_ECR_REPO:                 erp-lite/api-core
  LAMBDA_ECR_REPO:              erp-lite/lambda-fiscal
  LAMBDA_NOTIFICATIONS_ECR_REPO: erp-lite/lambda-notifications
  LAMBDA_BILLING_ECR_REPO:      erp-lite/lambda-billing
  LAMBDA_MARKETPLACE_ECR_REPO:  erp-lite/lambda-marketplace
  LAMBDA_WHATSAPP_ECR_REPO:     erp-lite/lambda-whatsapp
  TF_STATE_BUCKET:              erp-lite-terraform-state

jobs:
  deploy:
    name: Build → ECR → Terraform → Migrate → S3
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── AWS credentials ───────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Bootstrap: S3 state bucket ────────────────────────────────────────────
      # Terraform needs this bucket to exist BEFORE terraform init.
      # On every run we check and create if missing — idempotent.
      - name: Ensure Terraform state bucket exists
        run: |
          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "State bucket already exists."
          else
            echo "Creating state bucket $TF_STATE_BUCKET..."
            aws s3api create-bucket \
              --bucket "$TF_STATE_BUCKET" \
              --region "$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration \
                '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "State bucket created."
          fi

      # ── Terraform init ────────────────────────────────────────────────────────
      # terraform_wrapper: false so "terraform output" returns raw values
      # without the wrapper's extra stderr that breaks variable capture.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # ── Bootstrap: ensure ECR repo exists before Docker push ─────────────────
      # On first deploy the ECR repository doesn't exist yet.
      # We target only the ECR resources so the ECS service is not touched.
      # On subsequent runs this is a fast no-op (resources already in state).
      - name: Terraform Apply — bootstrap ECR
        working-directory: terraform
        env:
          TF_VAR_jwt_secret:      ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_focus_nfe_token: ${{ secrets.TF_VAR_FOCUS_NFE_TOKEN }}
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.api_core \
            -target=aws_ecr_lifecycle_policy.api_core \
            -target=aws_ecr_repository.lambda_fiscal \
            -target=aws_ecr_lifecycle_policy.lambda_fiscal \
            -target=aws_ecr_repository.lambda_notifications \
            -target=aws_ecr_lifecycle_policy.lambda_notifications \
            -target=aws_ecr_repository.lambda_billing \
            -target=aws_ecr_lifecycle_policy.lambda_billing \
            -target=aws_ecr_repository.lambda_marketplace \
            -target=aws_ecr_lifecycle_policy.lambda_marketplace \
            -target=aws_ecr_repository.lambda_whatsapp \
            -target=aws_ecr_lifecycle_policy.lambda_whatsapp

      # ── Compute ECR registry URL from current AWS account ─────────────────────
      # {account_id}.dkr.ecr.{region}.amazonaws.com — no secret needed.
      - name: Compute ECR registry URL
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "registry=${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      # ── Build & push api-core Docker image ───────────────────────────────────
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-core image
        uses: docker/build-push-action@v5
        with:
          context: services/api-core
          target: production
          push: true
          # ECS Fargate runs this task with runTask (migration override) right
          # after a fresh push — same class of issue documented for the Lambda
          # images below: without platform + provenance=false, Buildx pushes an
          # OCI image index (manifest list + attestation manifest) instead of a
          # plain Docker v2 Schema 2 manifest. Fargate has historically had
          # inconsistent support for that index shape, which can surface as the
          # task failing to ever start the container (null exitCode, no
          # CloudWatch logs) — exactly what "Run DB migrations" hit.
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:latest
          cache-from: type=gha,scope=api-core
          cache-to: type=gha,mode=max,scope=api-core

      - name: Build and push lambda-fiscal image
        uses: docker/build-push-action@v5
        with:
          context: services/lambda-fiscal
          push: true
          # Lambda requires a single-platform Docker v2 Schema 2 manifest.
          # Without platform + provenance=false, Buildx pushes an OCI manifest index
          # (manifest list) that Lambda rejects with "image manifest not supported".
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_ECR_REPO }}:latest
          cache-from: type=gha,scope=lambda-fiscal
          cache-to: type=gha,mode=max,scope=lambda-fiscal

      - name: Build and push lambda-notifications image
        uses: docker/build-push-action@v5
        with:
          context: services/lambda-notifications
          push: true
          # Same as lambda-fiscal: single-platform manifest required by Lambda.
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_NOTIFICATIONS_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_NOTIFICATIONS_ECR_REPO }}:latest
          cache-from: type=gha,scope=lambda-notifications
          cache-to: type=gha,mode=max,scope=lambda-notifications

      - name: Build and push lambda-billing image
        uses: docker/build-push-action@v5
        with:
          context: services/lambda-billing
          push: true
          # Lambda requires single-platform Docker v2 Schema 2 manifest.
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_BILLING_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_BILLING_ECR_REPO }}:latest
          cache-from: type=gha,scope=lambda-billing
          cache-to: type=gha,mode=max,scope=lambda-billing

      - name: Build and push lambda-marketplace image
        uses: docker/build-push-action@v5
        with:
          context: services/lambda-marketplace
          push: true
          # Lambda requires single-platform Docker v2 Schema 2 manifest.
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_MARKETPLACE_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_MARKETPLACE_ECR_REPO }}:latest
          cache-from: type=gha,scope=lambda-marketplace
          cache-to: type=gha,mode=max,scope=lambda-marketplace

      - name: Build and push lambda-whatsapp image
        uses: docker/build-push-action@v5
        with:
          context: services/lambda-whatsapp
          push: true
          # Lambda requires single-platform Docker v2 Schema 2 manifest.
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_WHATSAPP_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_WHATSAPP_ECR_REPO }}:latest
          cache-from: type=gha,scope=lambda-whatsapp
          cache-to: type=gha,mode=max,scope=lambda-whatsapp

      # ── Terraform Apply: full infra + ECS rolling deploy ─────────────────────
      # TF_VAR_image_tag sets var.image_tag → new task definition revision →
      # aws_ecs_service updates to the new revision → rolling deploy starts.
      # Also creates VPC, RDS, ALB, S3 bucket and CloudFront on first run.
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_jwt_secret:                          ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_focus_nfe_token:                     ${{ secrets.TF_VAR_FOCUS_NFE_TOKEN }}
          TF_VAR_ses_from_email:                      ${{ secrets.TF_VAR_SES_FROM_EMAIL }}
          TF_VAR_ses_from_name:                       ${{ secrets.TF_VAR_SES_FROM_NAME }}
          TF_VAR_acm_certificate_arn:                 ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN }}
          TF_VAR_image_tag:                           ${{ github.sha }}
          TF_VAR_lambda_fiscal_image_tag:             ${{ github.sha }}
          TF_VAR_lambda_notifications_image_tag:      ${{ github.sha }}
          TF_VAR_lambda_billing_image_tag:            ${{ github.sha }}
          TF_VAR_itau_client_id:                      ${{ secrets.TF_VAR_ITAU_CLIENT_ID }}
          TF_VAR_itau_client_secret:                  ${{ secrets.TF_VAR_ITAU_CLIENT_SECRET }}
          TF_VAR_lambda_marketplace_image_tag:        ${{ github.sha }}
          TF_VAR_mercado_livre_client_id:             ${{ secrets.TF_VAR_MERCADO_LIVRE_CLIENT_ID }}
          TF_VAR_mercado_livre_client_secret:         ${{ secrets.TF_VAR_MERCADO_LIVRE_CLIENT_SECRET }}
          TF_VAR_stripe_secret_key:                   ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret:               ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_lambda_whatsapp_image_tag:           ${{ github.sha }}
        run: terraform apply -auto-approve

      # ── Read Terraform outputs (single step, post-apply) ─────────────────────
      # All resources are guaranteed to exist after the apply above.
      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "cluster=$(terraform output -raw ecs_cluster_name)"               >> $GITHUB_OUTPUT
          echo "task_family=$(terraform output -raw ecs_task_definition_family)" >> $GITHUB_OUTPUT
          echo "subnets=$(terraform output -raw public_subnet_ids)"              >> $GITHUB_OUTPUT
          echo "sg=$(terraform output -raw api_security_group_id)"               >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)"               >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)"       >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_url)"                        >> $GITHUB_OUTPUT
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"            >> $GITHUB_OUTPUT
          echo "lambda_fiscal=$(terraform output -raw lambda_fiscal_name)"       >> $GITHUB_OUTPUT
          echo "lambda_notif=$(terraform output -raw lambda_notifications_name)" >> $GITHUB_OUTPUT
          echo "lambda_billing=$(terraform output -raw lambda_billing_name)"     >> $GITHUB_OUTPUT
          echo "lambda_marketplace=$(terraform output -raw lambda_marketplace_name)" >> $GITHUB_OUTPUT
          echo "lambda_whatsapp=$(terraform output -raw lambda_whatsapp_name)"   >> $GITHUB_OUTPUT
          echo "notif_dlq=$(terraform output -raw notifications_dlq_url)"        >> $GITHUB_OUTPUT
          echo "nfe_dlq=$(terraform output -raw nfe_dlq_url)"                   >> $GITHUB_OUTPUT
          echo "marketplace_dlq=$(terraform output -raw marketplace_sync_dlq_url)" >> $GITHUB_OUTPUT
          echo "whatsapp_dlq=$(terraform output -raw whatsapp_dlq_url)"          >> $GITHUB_OUTPUT

      # ── Force Lambda image update + wait ─────────────────────────────────────
      # Terraform updates the Lambda's image_uri config, but the update is
      # asynchronous. We explicitly call update-function-code and wait so the
      # new image is guaranteed to be active before migrations run.
      # Without this, a Lambda invoked immediately after deploy may still run
      # the previous image.
      - name: Update Lambda functions with new images and wait
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"

          echo "Updating lambda-fiscal → ${{ steps.tf.outputs.lambda_fiscal }}"
          aws lambda update-function-code \
            --function-name "${{ steps.tf.outputs.lambda_fiscal }}" \
            --image-uri "${REGISTRY}/${{ env.LAMBDA_ECR_REPO }}:${{ github.sha }}" \
            --no-cli-pager

          echo "Updating lambda-notifications → ${{ steps.tf.outputs.lambda_notif }}"
          aws lambda update-function-code \
            --function-name "${{ steps.tf.outputs.lambda_notif }}" \
            --image-uri "${REGISTRY}/${{ env.LAMBDA_NOTIFICATIONS_ECR_REPO }}:${{ github.sha }}" \
            --no-cli-pager

          echo "Updating lambda-billing → ${{ steps.tf.outputs.lambda_billing }}"
          aws lambda update-function-code \
            --function-name "${{ steps.tf.outputs.lambda_billing }}" \
            --image-uri "${REGISTRY}/${{ env.LAMBDA_BILLING_ECR_REPO }}:${{ github.sha }}" \
            --no-cli-pager

          echo "Updating lambda-marketplace → ${{ steps.tf.outputs.lambda_marketplace }}"
          aws lambda update-function-code \
            --function-name "${{ steps.tf.outputs.lambda_marketplace }}" \
            --image-uri "${REGISTRY}/${{ env.LAMBDA_MARKETPLACE_ECR_REPO }}:${{ github.sha }}" \
            --no-cli-pager

          echo "Updating lambda-whatsapp → ${{ steps.tf.outputs.lambda_whatsapp }}"
          aws lambda update-function-code \
            --function-name "${{ steps.tf.outputs.lambda_whatsapp }}" \
            --image-uri "${REGISTRY}/${{ env.LAMBDA_WHATSAPP_ECR_REPO }}:${{ github.sha }}" \
            --no-cli-pager

          echo "Waiting for Lambda functions to be active..."
          aws lambda wait function-updated \
            --function-name "${{ steps.tf.outputs.lambda_fiscal }}"
          echo "✓ lambda-fiscal ready"

          aws lambda wait function-updated \
            --function-name "${{ steps.tf.outputs.lambda_notif }}"
          echo "✓ lambda-notifications ready"

          aws lambda wait function-updated \
            --function-name "${{ steps.tf.outputs.lambda_billing }}"
          echo "✓ lambda-billing ready"

          aws lambda wait function-updated \
            --function-name "${{ steps.tf.outputs.lambda_marketplace }}"
          echo "✓ lambda-marketplace ready"

          aws lambda wait function-updated \
            --function-name "${{ steps.tf.outputs.lambda_whatsapp }}"
          echo "✓ lambda-whatsapp ready"

          echo "All Lambda functions updated and active."

      # ── Run DB migrations ─────────────────────────────────────────────────────
      # Runs AFTER terraform apply so the task definition with the new image
      # is guaranteed to be registered in ECS. Overrides only the command —
      # the image is already set in the task definition by Terraform.
      - name: Run DB migrations
        run: |
          OVERRIDES='{"containerOverrides":[{"name":"api-core","command":["npm","run","migrate"]}]}'

          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --task-definition "${{ steps.tf.outputs.task_family }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.tf.outputs.subnets }}],securityGroups=[${{ steps.tf.outputs.sg }}],assignPublicIp=ENABLED}" \
            --overrides "$OVERRIDES" \
            --count 1 \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          TASK_ID=$(basename "$TASK_ARN")

          aws ecs wait tasks-stopped \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --tasks "$TASK_ARN"

          # A task can stop WITHOUT the container ever starting (e.g. image
          # pull failure, resource init error) — in that case exitCode is null
          # ("None" in CLI text output) and no CloudWatch log stream exists.
          # stoppedReason/containers[0].reason are the only place that failure
          # mode is actually explained, so always print them, not just exitCode.
          DESC=$(aws ecs describe-tasks \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].{exitCode:containers[0].exitCode,lastStatus:containers[0].lastStatus,containerReason:containers[0].reason,stoppedReason:stoppedReason}' \
            --output json)
          echo "Task result: $DESC"
          EXIT=$(echo "$DESC" | jq -r '.exitCode')

          # CloudWatch log events can lag a few seconds behind task-stopped —
          # retry a few times before giving up instead of a single immediate try.
          echo "── Migration container logs ──────────────────────────────────"
          LOGS=""
          for attempt in 1 2 3 4 5; do
            # "|| true" is required here — under `bash -e`, a failing command
            # substitution on its own assignment line (e.g. log stream not
            # created yet — ResourceNotFoundException) would abort the whole
            # step immediately, skipping every retry and the exit-code check
            # below.
            LOGS=$(aws logs get-log-events \
              --log-group-name "/ecs/erp-lite-prod/api-core" \
              --log-stream-name "api-core/api-core/${TASK_ID}" \
              --start-from-head \
              --query 'events[*].message' \
              --output text 2>/dev/null) || true
            if [ -n "$LOGS" ] && [ "$LOGS" != "None" ]; then break; fi
            sleep 3
          done
          if [ -n "$LOGS" ] && [ "$LOGS" != "None" ]; then
            echo "$LOGS"
          else
            echo "(no log events found for this task — the container likely never started; see stoppedReason above)"
          fi
          echo "─────────────────────────────────────────────────────────────"

          if [ "$EXIT" != "0" ]; then
            echo "::error::Migration failed — $DESC"
            exit 1
          fi
          echo "Migrations completed successfully."

      # ── Lambda smoke-check: verify no startup errors in CloudWatch ───────────
      # Tails the last 60 s of Lambda logs looking for INIT_REPORT + ERROR.
      # A Lambda that crashes on cold start (e.g., missing env var, bad image)
      # will leave ERROR entries even before it processes any SQS message.
      # Non-fatal: if log stream doesn't exist yet we print a notice and move on.
      - name: Check Lambda CloudWatch logs for startup errors
        run: |
          check_lambda_logs() {
            local fn=$1
            local LOG_GROUP="/aws/lambda/${fn}"
            local START_TIME=$(( ($(date +%s) - 120) * 1000 ))   # last 2 min

            STREAMS=$(aws logs describe-log-streams \
              --log-group-name "${LOG_GROUP}" \
              --order-by LastEventTime \
              --descending \
              --max-items 3 \
              --query 'logStreams[*].logStreamName' \
              --output text 2>/dev/null || echo "")

            if [ -z "$STREAMS" ]; then
              echo "ℹ  ${fn}: no log streams yet (Lambda not yet invoked — OK)"
              return 0
            fi

            ERRORS=0
            for STREAM in $STREAMS; do
              ERRS=$(aws logs filter-log-events \
                --log-group-name "${LOG_GROUP}" \
                --log-stream-names "${STREAM}" \
                --filter-pattern "ERROR" \
                --start-time "${START_TIME}" \
                --query 'events[*].message' \
                --output text 2>/dev/null | wc -l || echo 0)
              ERRORS=$(( ERRORS + ERRS ))
            done

            if [ "$ERRORS" -gt 0 ]; then
              echo "::warning::${fn}: ${ERRORS} ERROR log entries in the last 2 min — check CloudWatch"
            else
              echo "✓  ${fn}: no ERROR logs in last 2 min"
            fi
          }

          check_lambda_logs "${{ steps.tf.outputs.lambda_fiscal }}"
          check_lambda_logs "${{ steps.tf.outputs.lambda_notif }}"
          check_lambda_logs "${{ steps.tf.outputs.lambda_billing }}"
          check_lambda_logs "${{ steps.tf.outputs.lambda_marketplace }}"
          check_lambda_logs "${{ steps.tf.outputs.lambda_whatsapp }}"

      # ── DLQ health check ──────────────────────────────────────────────────────
      # If there are messages in DLQ after deploy it means Lambda failed 3×.
      # Report as a warning (not error) so the deploy isn't blocked by pre-existing
      # DLQ messages, but the issue is visible in the CI summary.
      - name: Check SQS DLQs for failed messages
        run: |
          check_dlq() {
            local NAME=$1
            local URL=$2
            COUNT=$(aws sqs get-queue-attributes \
              --queue-url "${URL}" \
              --attribute-names ApproximateNumberOfMessages \
              --query 'Attributes.ApproximateNumberOfMessages' \
              --output text 2>/dev/null || echo "0")
            if [ "${COUNT}" -gt 0 ]; then
              echo "::warning::DLQ ${NAME} has ${COUNT} message(s) — Lambda failed 3×. Check CloudWatch logs."
            else
              echo "✓  DLQ ${NAME}: empty"
            fi
          }

          check_dlq "notifications-dlq"    "${{ steps.tf.outputs.notif_dlq }}"
          check_dlq "nfe-dlq"              "${{ steps.tf.outputs.nfe_dlq }}"
          check_dlq "marketplace-sync-dlq" "${{ steps.tf.outputs.marketplace_dlq }}"
          check_dlq "whatsapp-dlq"         "${{ steps.tf.outputs.whatsapp_dlq }}"

      # ── Build backoffice ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backoffice
        run: npm run build --workspace=apps/backoffice
        # VITE_API_URL is intentionally omitted — api.ts uses '' (empty string)
        # so all /v1/* calls become relative URLs. Both the SPA and the API are
        # served from the same CloudFront distribution (www.orquestraerp.com.br),
        # so relative URLs are same-origin and require no CORS headers at all.
        # Injecting the raw CloudFront domain (e.g. d1xxxx.cloudfront.net) would
        # make the browser treat requests as cross-origin → CORS blocked.

      # ── Deploy backoffice to S3 + CloudFront ─────────────────────────────────
      - name: Sync backoffice to S3
        run: |
          aws s3 sync apps/backoffice/dist \
            "s3://${{ steps.tf.outputs.s3_bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp apps/backoffice/dist/index.html \
            "s3://${{ steps.tf.outputs.s3_bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cf_id }}" \
            --paths "/*"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Print deployment URLs
        run: |
          echo "API:        ${{ steps.tf.outputs.api_url }}"
          echo "Backoffice: ${{ steps.tf.outputs.cf_domain }}"
