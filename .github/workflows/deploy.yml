name: Deploy to AWS (Terraform)

on:
  push:
    branches: [main]

# AWS_REGION is the only hardcoded value here — it matches terraform/variables.tf default.
# All other runtime values (ECR registry, S3 bucket, CloudFront ID, API URL) are
# derived from Terraform state so no extra secrets are needed beyond credentials.
env:
  AWS_REGION:   us-east-1
  API_ECR_REPO: erp-lite/api-core

jobs:
  deploy:
    name: Build → ECR → Migrate → Terraform Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for OIDC auth if switching from long-lived keys

    steps:
      - uses: actions/checkout@v4

      # ── AWS credentials ───────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Compute ECR registry from the caller's AWS account ────────────────────
      # Format: {account_id}.dkr.ecr.{region}.amazonaws.com
      # This avoids storing ECR_REGISTRY as a secret — it's deterministic.
      - name: Compute ECR registry URL
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "registry=${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      # ── Terraform init ────────────────────────────────────────────────────────
      # terraform_wrapper: false so that "terraform output" returns raw values
      # without the wrapper's extra stderr that breaks variable capture.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # ── Read current state (pre-deploy, no apply) ─────────────────────────────
      # Captures cluster/subnet/SG for the migration ECS run-task that must run
      # BEFORE the new service version goes live. Falls back to empty string on
      # the very first deploy when no Terraform state exists yet.
      - name: Read pre-deploy Terraform outputs
        id: tf-pre
        working-directory: terraform
        run: |
          echo "cluster=$(terraform output -raw ecs_cluster_name 2>/dev/null || true)"          >> $GITHUB_OUTPUT
          echo "task_family=$(terraform output -raw ecs_task_definition_family 2>/dev/null || true)" >> $GITHUB_OUTPUT
          echo "subnets=$(terraform output -raw public_subnet_ids 2>/dev/null || true)"         >> $GITHUB_OUTPUT
          echo "sg=$(terraform output -raw api_security_group_id 2>/dev/null || true)"         >> $GITHUB_OUTPUT

      # ── Build & push api-core Docker image ───────────────────────────────────
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-core image
        uses: docker/build-push-action@v5
        with:
          context: services/api-core
          target: production
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Run DB migrations BEFORE new service version goes live ───────────────
      # Uses the existing task definition (for IAM roles + env vars) but overrides
      # the container image to the new SHA so new migration files are included.
      # Skipped on first deploy when no Terraform state exists yet.
      - name: Run migrations via ECS run-task
        if: steps.tf-pre.outputs.cluster != ''
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ github.sha }}"
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.tf-pre.outputs.cluster }}" \
            --task-definition "${{ steps.tf-pre.outputs.task_family }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.tf-pre.outputs.subnets }}],securityGroups=[${{ steps.tf-pre.outputs.sg }}],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"api-core\",\"image\":\"${IMAGE}\",\"command\":[\"npm\",\"run\",\"migrate\"]}]}" \
            --count 1 \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Migration task ARN: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.tf-pre.outputs.cluster }}" \
            --tasks "$TASK_ARN"
          EXIT=$(aws ecs describe-tasks \
            --cluster "${{ steps.tf-pre.outputs.cluster }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          if [ "$EXIT" != "0" ]; then
            echo "Migration failed with exit code $EXIT"; exit 1
          fi
          echo "Migrations completed successfully."

      # ── Terraform apply ───────────────────────────────────────────────────────
      # Passing image_tag=$SHA causes Terraform to:
      #   1. Register a new ECS task definition revision with the new image
      #   2. Update aws_ecs_service to point to the new revision → rolling deploy
      # Also creates S3 bucket + CloudFront distribution on first deploy.
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.sha }}"

      # ── Read post-deploy outputs ──────────────────────────────────────────────
      # S3 bucket and CloudFront are now guaranteed to exist after the apply above.
      - name: Read post-deploy Terraform outputs
        id: tf-post
        working-directory: terraform
        run: |
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)"            >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)"    >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_url)"                     >> $GITHUB_OUTPUT
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"         >> $GITHUB_OUTPUT

      # ── Build backoffice ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backoffice
        run: npm run build --workspace=apps/backoffice
        env:
          VITE_API_URL: ${{ steps.tf-post.outputs.api_url }}

      # ── Deploy backoffice to S3 + CloudFront ─────────────────────────────────
      - name: Sync backoffice to S3
        run: |
          aws s3 sync apps/backoffice/dist \
            "s3://${{ steps.tf-post.outputs.s3_bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp apps/backoffice/dist/index.html \
            "s3://${{ steps.tf-post.outputs.s3_bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf-post.outputs.cf_id }}" \
            --paths "/*"

      - name: Print deployment URLs
        run: |
          echo "API:        ${{ steps.tf-post.outputs.api_url }}"
          echo "Backoffice: ${{ steps.tf-post.outputs.cf_domain }}"
