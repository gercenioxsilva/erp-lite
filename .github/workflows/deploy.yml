name: Deploy to AWS — prod

on:
  push:
    branches: [main]

# AWS_REGION matches terraform/variables.tf default (us-east-1).
# All other runtime values come from Terraform outputs — no extra secrets needed.
env:
  AWS_REGION:                   us-east-1
  API_ECR_REPO:                 erp-lite/api-core
  LAMBDA_ECR_REPO:              erp-lite/lambda-fiscal
  LAMBDA_NOTIFICATIONS_ECR_REPO: erp-lite/lambda-notifications
  TF_STATE_BUCKET:              erp-lite-terraform-state

jobs:
  deploy:
    name: Build → ECR → Terraform → Migrate → S3
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── AWS credentials ───────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Bootstrap: S3 state bucket ────────────────────────────────────────────
      # Terraform needs this bucket to exist BEFORE terraform init.
      # On every run we check and create if missing — idempotent.
      - name: Ensure Terraform state bucket exists
        run: |
          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "State bucket already exists."
          else
            echo "Creating state bucket $TF_STATE_BUCKET..."
            aws s3api create-bucket \
              --bucket "$TF_STATE_BUCKET" \
              --region "$AWS_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration \
                '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "State bucket created."
          fi

      # ── Terraform init ────────────────────────────────────────────────────────
      # terraform_wrapper: false so "terraform output" returns raw values
      # without the wrapper's extra stderr that breaks variable capture.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # ── Bootstrap: ensure ECR repo exists before Docker push ─────────────────
      # On first deploy the ECR repository doesn't exist yet.
      # We target only the ECR resources so the ECS service is not touched.
      # On subsequent runs this is a fast no-op (resources already in state).
      - name: Terraform Apply — bootstrap ECR
        working-directory: terraform
        env:
          TF_VAR_jwt_secret:      ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_focus_nfe_token: ${{ secrets.TF_VAR_FOCUS_NFE_TOKEN }}
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.api_core \
            -target=aws_ecr_lifecycle_policy.api_core \
            -target=aws_ecr_repository.lambda_fiscal \
            -target=aws_ecr_lifecycle_policy.lambda_fiscal \
            -target=aws_ecr_repository.lambda_notifications \
            -target=aws_ecr_lifecycle_policy.lambda_notifications

      # ── Compute ECR registry URL from current AWS account ─────────────────────
      # {account_id}.dkr.ecr.{region}.amazonaws.com — no secret needed.
      - name: Compute ECR registry URL
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "registry=${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      # ── Build & push api-core Docker image ───────────────────────────────────
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-core image
        uses: docker/build-push-action@v5
        with:
          context: services/api-core
          target: production
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:latest
          cache-from: type=gha,scope=api-core
          cache-to: type=gha,mode=max,scope=api-core

      - name: Build and push lambda-fiscal image
        uses: docker/build-push-action@v5
        with:
          context: services/lambda-fiscal
          push: true
          # Lambda requires a single-platform Docker v2 Schema 2 manifest.
          # Without platform + provenance=false, Buildx pushes an OCI manifest index
          # (manifest list) that Lambda rejects with "image manifest not supported".
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_ECR_REPO }}:latest
          cache-from: type=gha,scope=lambda-fiscal
          cache-to: type=gha,mode=max,scope=lambda-fiscal

      - name: Build and push lambda-notifications image
        uses: docker/build-push-action@v5
        with:
          context: services/lambda-notifications
          push: true
          # Same as lambda-fiscal: single-platform manifest required by Lambda.
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_NOTIFICATIONS_ECR_REPO }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.LAMBDA_NOTIFICATIONS_ECR_REPO }}:latest
          cache-from: type=gha,scope=lambda-notifications
          cache-to: type=gha,mode=max,scope=lambda-notifications

      # ── Terraform Apply: full infra + ECS rolling deploy ─────────────────────
      # TF_VAR_image_tag sets var.image_tag → new task definition revision →
      # aws_ecs_service updates to the new revision → rolling deploy starts.
      # Also creates VPC, RDS, ALB, S3 bucket and CloudFront on first run.
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_jwt_secret:                          ${{ secrets.TF_VAR_JWT_SECRET }}
          TF_VAR_focus_nfe_token:                     ${{ secrets.TF_VAR_FOCUS_NFE_TOKEN }}
          TF_VAR_ses_from_email:                      ${{ secrets.TF_VAR_SES_FROM_EMAIL }}
          TF_VAR_ses_from_name:                       ${{ secrets.TF_VAR_SES_FROM_NAME }}
          TF_VAR_image_tag:                           ${{ github.sha }}
          TF_VAR_lambda_fiscal_image_tag:             ${{ github.sha }}
          TF_VAR_lambda_notifications_image_tag:      ${{ github.sha }}
        run: terraform apply -auto-approve

      # ── Read Terraform outputs (single step, post-apply) ─────────────────────
      # All resources are guaranteed to exist after the apply above.
      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "cluster=$(terraform output -raw ecs_cluster_name)"               >> $GITHUB_OUTPUT
          echo "task_family=$(terraform output -raw ecs_task_definition_family)" >> $GITHUB_OUTPUT
          echo "subnets=$(terraform output -raw public_subnet_ids)"              >> $GITHUB_OUTPUT
          echo "sg=$(terraform output -raw api_security_group_id)"               >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)"               >> $GITHUB_OUTPUT
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)"       >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_url)"                        >> $GITHUB_OUTPUT
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"            >> $GITHUB_OUTPUT

      # ── Run DB migrations ─────────────────────────────────────────────────────
      # Runs AFTER terraform apply so the task definition with the new image
      # is guaranteed to be registered in ECS. Overrides only the command —
      # the image is already set in the task definition by Terraform.
      - name: Run DB migrations
        run: |
          OVERRIDES='{"containerOverrides":[{"name":"api-core","command":["npm","run","migrate"]}]}'

          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --task-definition "${{ steps.tf.outputs.task_family }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.tf.outputs.subnets }}],securityGroups=[${{ steps.tf.outputs.sg }}],assignPublicIp=ENABLED}" \
            --overrides "$OVERRIDES" \
            --count 1 \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          TASK_ID=$(basename "$TASK_ARN")

          aws ecs wait tasks-stopped \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --tasks "$TASK_ARN"

          # Print CloudWatch logs so failures are visible in CI output
          echo "── Migration container logs ──────────────────────────────────"
          aws logs get-log-events \
            --log-group-name "/ecs/erp-lite-prod/api-core" \
            --log-stream-name "api-core/api-core/${TASK_ID}" \
            --start-from-head \
            --query 'events[*].message' \
            --output text 2>/dev/null || echo "(no logs available)"
          echo "─────────────────────────────────────────────────────────────"

          EXIT=$(aws ecs describe-tasks \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT" != "0" ]; then
            echo "::error::Migration failed with exit code $EXIT"
            exit 1
          fi
          echo "Migrations completed successfully."

      # ── Build backoffice ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backoffice
        run: npm run build --workspace=apps/backoffice
        env:
          VITE_API_URL: ${{ steps.tf.outputs.api_url }}

      # ── Deploy backoffice to S3 + CloudFront ─────────────────────────────────
      - name: Sync backoffice to S3
        run: |
          aws s3 sync apps/backoffice/dist \
            "s3://${{ steps.tf.outputs.s3_bucket }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp apps/backoffice/dist/index.html \
            "s3://${{ steps.tf.outputs.s3_bucket }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cf_id }}" \
            --paths "/*"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Print deployment URLs
        run: |
          echo "API:        ${{ steps.tf.outputs.api_url }}"
          echo "Backoffice: ${{ steps.tf.outputs.cf_domain }}"
