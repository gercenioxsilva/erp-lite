name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER:  erp-lite-prod
  API_SERVICE:  erp-lite-api-core-prod
  API_TASK_DEF: erp-lite-api-core-prod
  API_ECR_REPO: erp-lite/api-core

jobs:
  deploy:
    name: Build → ECR → ECS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed if using OIDC auth (recommended over long-lived keys)

    steps:
      - uses: actions/checkout@v4

      # ── AWS Credentials ────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── ECR Login ──────────────────────────────────────────────────────
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & Push api-core ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-core image
        uses: docker/build-push-action@v5
        with:
          context: services/api-core
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.API_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.API_ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Run database migrations ────────────────────────────────────────
      - name: Run migrations via ECS run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$API_TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET_IDS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api-core","command":["npm","run","migrate"]}]}' \
            --count 1 \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"
          EXIT=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          if [ "$EXIT" != "0" ]; then
            echo "Migration failed with exit code $EXIT"
            exit 1
          fi

      # ── Rolling deploy api-core ────────────────────────────────────────
      - name: Update ECS service (rolling deploy)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$API_SERVICE" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE"

      # ── Build & Deploy backoffice to S3 / CloudFront ──────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backoffice
        run: npm run build --workspace=apps/backoffice
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy backoffice to S3
        run: |
          aws s3 sync apps/backoffice/dist \
            "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp apps/backoffice/dist/index.html \
            "s3://${{ secrets.S3_BUCKET_NAME }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
