name: Deploy to AWS (Terraform)

on:
  push:
    branches: [main]

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  API_ECR_REPO: erp-lite/api-core

jobs:
  deploy:
    name: Build → ECR → Migrate → Terraform Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC (use instead of long-lived keys when possible)

    steps:
      - uses: actions/checkout@v4

      # ── AWS credentials ───────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Terraform init ────────────────────────────────────────────────────────
      # terraform_wrapper: false so that "terraform output" prints raw values
      # without the wrapper's extra stderr lines that break variable capture.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # ── Read current infra state (pre-deploy, no apply yet) ───────────────────
      # This gives us subnet/SG IDs for the migration ECS run-task without
      # needing to store them as GitHub secrets. Falls back to empty string on
      # first deploy (when no Terraform state exists yet).
      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "cluster=$(terraform output -raw ecs_cluster_name 2>/dev/null || true)"         >> $GITHUB_OUTPUT
          echo "task_family=$(terraform output -raw ecs_task_definition_family 2>/dev/null || true)" >> $GITHUB_OUTPUT
          echo "subnets=$(terraform output -raw public_subnet_ids 2>/dev/null || true)"        >> $GITHUB_OUTPUT
          echo "sg=$(terraform output -raw api_security_group_id 2>/dev/null || true)"        >> $GITHUB_OUTPUT

      # ── Build & push api-core Docker image ───────────────────────────────────
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-core image
        uses: docker/build-push-action@v5
        with:
          context: services/api-core
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.API_ECR_REPO }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.API_ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Run DB migrations BEFORE new service version goes live ───────────────
      # Uses the existing task definition (for its IAM roles + env vars) but
      # overrides the image to the newly built SHA so new migration files run.
      # Skipped on the very first deploy when no Terraform state exists yet.
      - name: Run migrations via ECS run-task
        if: steps.tf.outputs.cluster != ''
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.API_ECR_REPO }}:${{ github.sha }}"
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --task-definition "${{ steps.tf.outputs.task_family }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.tf.outputs.subnets }}],securityGroups=[${{ steps.tf.outputs.sg }}],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"api-core\",\"image\":\"${IMAGE}\",\"command\":[\"npm\",\"run\",\"migrate\"]}]}" \
            --count 1 \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Migration task ARN: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --tasks "$TASK_ARN"
          EXIT=$(aws ecs describe-tasks \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          if [ "$EXIT" != "0" ]; then
            echo "Migration failed with exit code $EXIT"
            exit 1
          fi
          echo "Migrations completed successfully."

      # ── Terraform apply: register new task definition + rolling deploy ────────
      # Passing image_tag as a variable causes Terraform to register a new ECS
      # task definition revision and update the service to use it. The service
      # performs a rolling deployment automatically (no manual ecs update-service).
      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.TF_VAR_JWT_SECRET }}
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.sha }}"

      # ── Build & deploy backoffice (S3 + CloudFront) ───────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backoffice
        run: npm run build --workspace=apps/backoffice
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy backoffice to S3
        run: |
          aws s3 sync apps/backoffice/dist \
            "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp apps/backoffice/dist/index.html \
            "s3://${{ secrets.S3_BUCKET_NAME }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
