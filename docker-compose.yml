services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       erp_lite
      POSTGRES_USER:     erp_lite
      POSTGRES_PASSWORD: erp_lite
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_lite -d erp_lite"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── LocalStack (SQS + S3 + SES emulation) ─────────────────────────────────
  # Free tier covers SQS, S3, SES — all services needed for local dev.
  # Queues and bucket are created by the init script after LocalStack is ready.
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES:            sqs,s3,ses
      DEFAULT_REGION:      us-east-1
      AWS_DEFAULT_REGION:  us-east-1
      AWS_ACCESS_KEY_ID:   test
      AWS_SECRET_ACCESS_KEY: test
      # Makes LocalStack return URLs with the service name so containers can resolve them
      LOCALSTACK_HOST:     localstack
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # ── Migrations (run once then exit) ────────────────────────────────────────
  # Usage: docker compose run --rm migrate
  migrate:
    build:
      context: ./services/api-core
      target: development
    command: npm run migrate:dev
    environment:
      DATABASE_URL: postgres://erp_lite:erp_lite@db:5432/erp_lite
    volumes:
      - ./services/api-core/src:/app/src
      - ./services/api-core/db:/app/db
    depends_on:
      db:
        condition: service_healthy
    profiles: [migrate]

  # ── API Core (Fastify — hot-reload via ts-node-dev) ─────────────────────────
  api-core:
    build:
      context: ./services/api-core
      target: development
    command: npm run dev
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL:           postgres://erp_lite:erp_lite@db:5432/erp_lite
      NODE_ENV:               development
      PORT:                   3000
      JWT_SECRET:             local-dev-secret
      AWS_REGION:             us-east-1
      AWS_ACCESS_KEY_ID:      test
      AWS_SECRET_ACCESS_KEY:  test
      AWS_ENDPOINT_URL:       http://localstack:4566
      NFE_REQUESTS_QUEUE_URL:  http://localstack:4566/000000000000/nfe-requests
      NFE_RESULTS_QUEUE_URL:   http://localstack:4566/000000000000/nfe-results
      NOTIFICATIONS_QUEUE_URL: http://localstack:4566/000000000000/notifications
      NFE_BUCKET:              nfe-xmls-local
      BILLING_REQUESTS_QUEUE_URL: http://localstack:4566/000000000000/billing-requests
      BILLING_RESULTS_QUEUE_URL:  http://localstack:4566/000000000000/billing-results
      # Optional Stripe test-mode wiring for local end-to-end billing verification.
      # Empty by default (Stripe stays disabled) — set these in a git-ignored root
      # .env with a personal Stripe TEST-mode key to opt in locally, then run
      # `stripe listen --forward-to http://localhost:3004/v1/subscription/webhook`
      # (adjust the port to this machine's docker-compose.override.yml mapping).
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - ./services/api-core/src:/app/src
      - ./services/api-core/db:/app/db
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp-lite-api.rule=Host(`api.erp-lite.localhost`)
      - traefik.http.services.erp-lite-api.loadbalancer.server.port=3000

  # ── Lambda Fiscal (local runner polls nfe-requests queue) ─────────────────
  # Mirrors the Lambda function that AWS triggers from SQS in production.
  # Connect to Focus NF-e sandbox by setting FOCUS_NFE_TOKEN to a sandbox token.
  lambda-fiscal:
    build:
      context: ./services/lambda-fiscal
      target: development
    environment:
      AWS_REGION:             us-east-1
      AWS_ACCESS_KEY_ID:      test
      AWS_SECRET_ACCESS_KEY:  test
      AWS_ENDPOINT_URL:       http://localstack:4566
      FOCUS_NFE_TOKEN:        ${FOCUS_NFE_TOKEN:-local-sandbox-token}
      NFE_REQUESTS_QUEUE_URL:  http://localstack:4566/000000000000/nfe-requests
      NFE_RESULTS_QUEUE_URL:   http://localstack:4566/000000000000/nfe-results
      NFE_BUCKET:             nfe-xmls-local
      LOG_LEVEL:              debug
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  # ── Lambda Notifications (local runner polls notifications queue) ───────────
  # Sends emails via LocalStack SES (captured locally, not delivered).
  # View captured emails at: http://localhost:4566/_localstack/ses
  lambda-notifications:
    build:
      context: ./services/lambda-notifications
      target: development
    environment:
      AWS_REGION:             us-east-1
      AWS_ACCESS_KEY_ID:      test
      AWS_SECRET_ACCESS_KEY:  test
      AWS_ENDPOINT_URL:       http://localstack:4566
      SES_FROM_EMAIL:         noreply@localhost
      SES_FROM_NAME:          GAX ERP (local)
      NOTIFICATIONS_QUEUE_URL: http://localstack:4566/000000000000/notifications
      LOG_LEVEL:              debug
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  # ── Lambda Billing (local runner polls billing-requests queue) ────────────────
  # Processes boleto generation requests. Without ITAU_CLIENT_ID/SECRET it returns
  # a descriptive error via billing-results (visible in the boleto status).
  lambda-billing:
    build:
      context: ./services/lambda-billing
      target: development
    environment:
      AWS_REGION:                us-east-1
      AWS_ACCESS_KEY_ID:         test
      AWS_SECRET_ACCESS_KEY:     test
      AWS_ENDPOINT_URL:          http://localstack:4566
      BILLING_REQUESTS_QUEUE_URL: http://localstack:4566/000000000000/billing-requests
      BILLING_RESULTS_QUEUE_URL:  http://localstack:4566/000000000000/billing-results
      BILLING_BUCKET:            billing-pdfs-local
      ITAU_CLIENT_ID:            ${ITAU_CLIENT_ID:-}
      ITAU_CLIENT_SECRET:        ${ITAU_CLIENT_SECRET:-}
      ITAU_BASE_URL:             ${ITAU_BASE_URL:-https://sandbox.devportal.itau.com.br}
      ITAU_AUTH_URL:             ${ITAU_AUTH_URL:-https://sts.itau.com.br/itauBank/api/v2/token}
      LOG_LEVEL:                 debug
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  # ── Backoffice (React + Vite — hot-reload) ─────────────────────────────────
  backoffice:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: "http://api-core:3000"
    volumes:
      - ./apps/backoffice:/app
      - backoffice_nm:/app/node_modules
    depends_on:
      - api-core
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp-lite.rule=Host(`erp-lite.localhost`)
      - traefik.http.services.erp-lite.loadbalancer.server.port=5173

volumes:
  pgdata:
  localstack_data:
  backoffice_nm:
